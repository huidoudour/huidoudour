name: Generate Snake

on:
  schedule:
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/github-contribution-grid-snake.svg
            assets/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH signing key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_SIGNING_KEY }}" > ~/.ssh/signing_key
          chmod 600 ~/.ssh/signing_key

      - name: Commit files
        uses: EndBug/add-and-commit@v9
        with:
          message: "Generate Contribution Snake"
          add: "assets/*.svg"
          default_author: github_actions
          allow_empty_commit: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_CONFIG_COUNT: "5"
          GIT_CONFIG_KEY_0: "gpg.format"
          GIT_CONFIG_VALUE_0: "ssh"
          GIT_CONFIG_KEY_1: "user.signingkey"
          GIT_CONFIG_VALUE_1: "~/.ssh/signing_key"
          GIT_CONFIG_KEY_2: "gpg.ssh.program"
          GIT_CONFIG_VALUE_2: "ssh-keygen"
          GIT_CONFIG_KEY_3: "user.name"
          GIT_CONFIG_VALUE_3: "${{ github.repository_owner }}"
          GIT_CONFIG_KEY_4: "user.email"
          GIT_CONFIG_VALUE_4: "${{ github.repository_owner }}@users.noreply.github.com"